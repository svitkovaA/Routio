server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location /routio/ {
        try_files $uri $uri/ /routio/index.html;
    }

    location /routio/api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
